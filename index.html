<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تهنئة العيد</title>

<style>
@font-face {
  font-family: "Hacen";
  src: url("HacenTunisia.ttf");
}

body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.images {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
}

.images img {
  width: 150px;
  border-radius: 10px;
  cursor: pointer;
  border: 3px solid transparent;
}

.images img.selected {
  border-color: #000;
}

input {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  background: black;
  color: white;
}

canvas {
  max-width: 100%;
  margin-top: 20px;
}

.footer {
  margin-top: 40px;
  font-size: 13px;
  color: #888;
}
</style>
</head>

<body>

<h2>اختر التصميم واكتب اسمك 🎉</h2>

<div class="images">
  <img src="eid1.PNG" onclick="selectImage(this, 'eid1.PNG')" class="selected">
  <img src="eid2.PNG" onclick="selectImage(this, 'eid2.PNG')">
</div>

<input type="text" id="nameInput" placeholder="اكتب اسمك">
<br>
<button onclick="generateImage()">تحميل</button>

<canvas id="canvas"></canvas>

<script>
let selectedImage = "eid1.PNG";

function selectImage(el, src) {
  selectedImage = src;
  document.querySelectorAll("img").forEach(i => i.classList.remove("selected"));
  el.classList.add("selected");
}

function generateImage() {
  const name = document.getElementById("nameInput").value;
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = selectedImage;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    // 🎨 تحديد اللون حسب الصورة
    let color = "#E9C699"; // افتراضي eid1

    if (selectedImage === "eid2.PNG") {
      color = "#444D65";
    }

    // ✍️ الخط
    ctx.font = "27px Hacen";
    ctx.fillStyle = color;
    ctx.textAlign = "center";

    // 📍 مكان الاسم (مضبوط داخل المستطيل)
    ctx.fillText(name, canvas.width / 2, canvas.height * 0.70);

    const link = document.createElement("a");
    link.download = "eid.png";
    link.href = canvas.toDataURL();
    link.click();
  };
}
</script>

<div class="footer">
هذا العمل مقدم لكم مجانًا من يزيد بن عبدالرحمن،<br>
ولا أرجو منكم إلا الدعاء لوالدي رحمه الله، وأن يحفظ الله والدتي ويمدّها بالصحة والعافية
</div>

</body>
</html>
