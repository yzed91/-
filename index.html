<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تهنئة العيد</title>

  <style>
    @font-face {
      font-family: "Hacen";
      src: url("HacenTunisia.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    canvas {
      max-width: 100%;
      border-radius: 12px;
    }

    button {
      margin-top: 20px;
      padding: 14px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2f6fed;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>حفظ الصورة</h2>

  <!-- الكانفس -->
  <canvas id="canvas" width="1080" height="1920"></canvas>

  <!-- زر الحفظ -->
  <button onclick="saveImage()">حفظ الصورة</button>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // تحميل الصورة
    const bg = new Image();
    bg.src = "eid-template.jpg"; // غيرها حسب صورتك

    bg.onload = () => {
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

      // مثال كتابة اسم
      ctx.fillStyle = "#1B6C64";
      ctx.font = "80px Hacen";
      ctx.textAlign = "center";

      ctx.fillText("يزيد", canvas.width / 2, 1000);
    };

    // ✅ الدالة الجديدة للحفظ (تحل مشكلة سناب)
    async function saveImage() {
      try {
        const blob = await new Promise((resolve) =>
          canvas.toBlob(resolve, "image/png", 1.0)
        );

        const file = new File([blob], "eid-greeting.png", {
          type: "image/png",
        });

        // 🔥 الأفضل للجوال (ومنها سناب)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: "Eid Greeting",
          });
          return;
        }

        // fallback تحميل عادي
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "eid-greeting.png";
        document.body.appendChild(a);
        a.click();
        a.remove();

        setTimeout(() => URL.revokeObjectURL(url), 2000);

      } catch (error) {
        console.log("Fallback triggered");

        // 💥 حل سناب النهائي
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          window.open(url, "_blank");
        }, "image/png", 1.0);
      }
    }
  </script>

</body>
</html>
