<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>بطاقات تهنئة باسمك | YazYamiLab</title>

  <!-- Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="بطاقات تهنئة باسمك  | YazYamiLab">
  <meta property="og:description" content="انشئ بطاقة تهنئتك في اقل مجهود">
  <meta property="og:image" content="https://yazyamilab.com/preview.png">
  <meta property="og:url" content="https://yazyamilab.com/">
  <meta property="og:site_name" content="YazYamiLab">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="تهنئة العيد | YazYamiLab">
  <meta name="twitter:description" content="انشئ بطاقة تهنئتك في اقل مجهود">
  <meta name="twitter:image" content="https://yazyamilab.com/preview.png">

  <!-- Safari + iPhone icon -->
  <link rel="icon" type="image/png" href="https://yazyamilab.com/preview.png">
  <link rel="apple-touch-icon" href="https://yazyamilab.com/preview.png">

  <style>
    @font-face {
      font-family: "Hacen";
      src: url("HacenTunisia.ttf") format("truetype");
    }

    @font-face {
      font-family: "MyriadArabic";
      src: url("Myriad Arabic Regular.ttf") format("truetype");
    }

    @font-face {
      font-family: "MehrabanArabic";
      src: url("MehrabanArabicTRIAL-Regular.otf") format("opentype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    /* Intro احترافي */
    #intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #111 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #intro img {
      width: 150px;
      max-width: 42vw;
      opacity: 0;
      transform: scale(0.85);
      animation: logoIn 0.9s ease forwards, logoPulse 1.8s ease-in-out 0.9s;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.15));
    }

    @keyframes logoIn {
      0% { opacity: 0; transform: scale(0.7); }
      60% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes logoPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    #intro.hide {
      opacity: 0;
      pointer-events: none;
    }

    #mainContent {
      transition: filter 0.4s ease, opacity 0.4s ease;
    }

    #mainContent.blur {
      filter: blur(6px);
      opacity: 0.9;
    }

    h2 {
      color: #222;
      margin-bottom: 10px;
    }

    .note {
      max-width: 700px;
      margin: 0 auto 10px auto;
      font-size: 15px;
      color: #888;
      line-height: 2;
      font-family: "MyriadArabic", Arial, sans-serif;
    }

    .eid-text {
      margin-bottom: 15px;
      font-size: 15px;
      color: #444;
      font-family: "MyriadArabic", Arial, sans-serif;
      font-weight: normal;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0 20px 0;
      flex-wrap: wrap;
    }

    .images img {
      width: 140px;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: 0.25s ease;
      filter: grayscale(100%);
      opacity: 0.75;
    }

    .images img.selected {
      border-color: #000;
      transform: scale(1.03);
      filter: grayscale(0%);
      opacity: 1;
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      margin-top: 12px;
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2d6cdf;
      color: #fff;
      cursor: pointer;
    }

    canvas {
      display: none;
    }

    #resultContainer {
      margin-top: 20px;
      display: none;
    }

    #resultImage {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div id="intro">
    <img src="logo2.png" alt="Logo">
  </div>

  <div id="mainContent" class="blur">

    <h2>اختر التصميم واكتب اسمك</h2>

    <div class="note" style="color: #1B6C64;">
      أهديكم هذا العمل مجاناً،<br>
      ولا أرجو منكم إلا دعوة صادقة لوالدي رحمه الله، وأن يحفظ الله والدتي ويديم عليها الصحة والعافية، وكل عام وأنتم بخير
    </div>

    <div class="eid-text">
      اخوكم: يزيد بن عبدالرحمن اليامي
    </div>

    <div class="images">
      <img src="ADHA-1.png" onclick="selectImage(this, 'ADHA-1.png')" class="selected" alt="ADHA-1">
      <img src="ADHA-2.png" onclick="selectImage(this, 'ADHA-2.png')" alt="ADHA-2">
      <img src="ADHA-3.png" onclick="selectImage(this, 'ADHA-3.png')" alt="ADHA-3">
      <img src="ADHA-4.png" onclick="selectImage(this, 'ADHA-4.png')" alt="ADHA-4">
      <img src="ADHA-5.png" onclick="selectImage(this, 'ADHA-5.png')" alt="ADHA-5">
    </div>

    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
    <br>
    <button onclick="generateImage()">إنشاء الصورة</button>

    <canvas id="canvas"></canvas>

    <div id="resultContainer">
      <img id="resultImage" src="" alt="Result">
      <br>
      <button onclick="shareImage()">حفظ الصورة</button>
    </div>

  </div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("intro").classList.add("hide");
        document.getElementById("mainContent").classList.remove("blur");
      }, 1600);
    });

    let selectedImage = "ADHA-1.png";
    let generatedImageURL = "";
    let generatedBlob = null;

    function selectImage(el, src) {
      selectedImage = src;
      document.querySelectorAll(".images img").forEach(img => {
        img.classList.remove("selected");
      });
      el.classList.add("selected");
    }

    function fitText(ctx, text, maxWidth, startSize, fontName) {
      let size = startSize;
      while (size > 12) {
        ctx.font = `${size}px "${fontName}"`;
        if (ctx.measureText(text).width <= maxWidth) {
          return size;
        }
        size--;
      }
      return size;
    }

    function dataURLToBlob(dataURL) {
      const arr = dataURL.split(",");
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], { type: mime });
    }

    async function generateImage() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = selectedImage;

      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = rej;
      });

      let activeFont = "MehrabanArabic";
      let startSize = 45;

      await document.fonts.load(`27px "${activeFont}"`);

      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      let color = "#28706d";
      const x = 540;
      let y = 1435;

      if (selectedImage === "ADHA-2.png") {
        color = "#d76959";
        y = 597;
      } else if (selectedImage === "ADHA-3.png") {
        color = "#EAEAEA";
        y = 450;
      } else if (selectedImage === "ADHA-4.png") {
        color = "#E9C699";
        y = 1620;
      }
            } else if (selectedImage === "ADHA-5.png") {
        color = "#E9C699";
        y = 450;
      }

      const maxWidth = 500;
      const fontSize = fitText(ctx, name, maxWidth, startSize, activeFont);

      ctx.font = `${fontSize}px "${activeFont}"`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.direction = "rtl";

      ctx.fillText(name, x, y, maxWidth);

      generatedImageURL = canvas.toDataURL("image/png");
      generatedBlob = dataURLToBlob(generatedImageURL);

      document.getElementById("resultImage").src = generatedImageURL;
      document.getElementById("resultContainer").style.display = "block";
    }

    async function shareImage() {
      if (!generatedBlob) return;

      const file = new File([generatedBlob], "تهنئة.png", { type: "image/png" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
      } else {
        const link = document.createElement("a");
        link.download = "تهنئة.png";
        link.href = generatedImageURL;
        link.click();
      }
    }
  </script>

</body>
</html>
