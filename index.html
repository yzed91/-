<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تهنئة العيد</title>

  <style>
    @font-face {
      font-family: "Myriad";
      src: url("Myriad Arabic Regular.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #222;
      margin-bottom: 10px;
    }

    .note {
      max-width: 700px;
      margin: 0 auto 10px auto;
      font-size: 13px;
      color: #888;
      line-height: 2;
    }

    .eid-text {
      margin-bottom: 15px;
      font-size: 15px;
      color: #444;
    }

    .hint {
      color: #007BFF;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0 20px 0;
      flex-wrap: wrap;
    }

    .images img {
      width: 140px;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: 0.2s;
    }

    .images img.selected {
      border-color: #000;
      transform: scale(1.03);
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      margin-top: 12px;
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2d6cdf;
      color: #fff;
      cursor: pointer;
    }

    canvas {
      display: none;
    }

    #resultContainer {
      margin-top: 20px;
      display: none;
    }

    #resultImage {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <h2>اختر التصميم واكتب اسمك</h2>

  <div class="note" style="color: #1B6C64;">
    هذا العمل مقدم لكم مجانًا من يزيد بن عبدالرحمن اليامي،<br>
    ولا أرجو منكم إلا الدعاء لوالدي رحمه الله، وأن يحفظ الله والدتي ويمدّها بالصحة والعافية
  </div>

  <div class="eid-text">
    وكل عام وأنتم بخير
  </div>

  <div class="images">
    <img src="ADHA-1.png" onclick="selectImage(this, 'ADHA-1.png')" class="selected">
    <img src="ADHA-2.png" onclick="selectImage(this, 'ADHA-2.png')">
  </div>

  <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
  <br>
  <button onclick="generateImage()">إنشاء الصورة</button>

  <canvas id="canvas"></canvas>

  <div id="resultContainer">
    <img id="resultImage" src="">
    <br>
    <button onclick="shareImage()">حفظ الصورة</button>
  </div>

  <script>
    let selectedImage = "ADHA-1.png";
    let generatedImageURL = "";

    function selectImage(el, src) {
      selectedImage = src;
      document.querySelectorAll(".images img").forEach(img => {
        img.classList.remove("selected");
      });
      el.classList.add("selected");
    }

    function fitText(ctx, text, maxWidth, startSize, fontName) {
      let size = startSize;
      while (size > 20) {
        ctx.font = `${size}px "${fontName}"`;
        if (ctx.measureText(text).width <= maxWidth) {
          return size;
        }
        size--;
      }
      return size;
    }

    async function generateImage() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = selectedImage;

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      await document.fonts.load('40px "Myriad"');

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      let color = "#28706d";
      if (selectedImage === "ADHA-2.png") {
        color = "#444D65";
      }

      const x = 540;

      let y = 1205;

      if (selectedImage === "ADHA-1.png") {
        y = 1435;
      }

      if (selectedImage === "ADHA-2.png") {
        y = 800;
      }

      const maxWidth = 360;

      const fontSize = fitText(ctx, name, maxWidth, 40, "Myriad");

      ctx.font = `${fontSize}px "Myriad"`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillText(name, x, y, maxWidth);

      generatedImageURL = canvas.toDataURL("image/png");

      document.getElementById("resultImage").src = generatedImageURL;
      document.getElementById("resultContainer").style.display = "block";
    }

    function shareImage() {
      const link = document.createElement("a");
      link.download = "eid.png";
      link.href = generatedImageURL;
      link.click();
    }
  </script>

</body>
</html>
