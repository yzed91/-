<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>تهنئة العيد | YazYamiLab</title>

  <!-- Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="تهنئة العيد | YazYamiLab">
  <meta property="og:description" content="انشئ بطاقة تهنئتك في اقل مجهود">
  <meta property="og:image" content="https://yazyamilab.com/preview.png">
  <meta property="og:url" content="https://yazyamilab.com/">
  <meta property="og:site_name" content="YazYamiLab">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="تهنئة العيد | YazYamiLab">
  <meta name="twitter:description" content="انشئ بطاقة تهنئتك في اقل مجهود">
  <meta name="twitter:image" content="https://yazyamilab.com/preview.png">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="https://yazyamilab.com/preview.png">
  <link rel="apple-touch-icon" href="https://yazyamilab.com/preview.png">

  <style>
    @font-face {
      font-family: "Hacen";
      src: url("HacenTunisia.ttf") format("truetype");
    }

    @font-face {
      font-family: "MyriadArabic";
      src: url("Myriad Arabic Regular.ttf") format("truetype");
    }

    /* 🔥 الخط الجديد */
    @font-face {
      font-family: "Tarhouny";
      src: url("Al-Tarhouny.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #111 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #intro img {
      width: 150px;
      opacity: 0;
      transform: scale(0.85);
      animation: logoIn 0.9s ease forwards;
    }

    @keyframes logoIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    #intro.hide {
      opacity: 0;
      pointer-events: none;
    }

    #mainContent.blur {
      filter: blur(6px);
      opacity: 0.9;
    }

    .note {
      font-size: 15px;
      line-height: 2;
      font-family: "MyriadArabic";
      color: #1B6C64;
    }

    .eid-text {
      font-size: 15px;
      font-family: "MyriadArabic";
      color: #444;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin: 15px 0;
    }

    .images img {
      width: 140px;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: 0.25s;
      filter: grayscale(100%);
      opacity: 0.7;
    }

    .images img.selected {
      filter: grayscale(0%);
      opacity: 1;
      border-color: #000;
      transform: scale(1.05);
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      margin-top: 12px;
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 12px;
      background: #2d6cdf;
      color: #fff;
      border: none;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>

  <div id="intro">
    <img src="logo2.png">
  </div>

  <div id="mainContent" class="blur">

    <h2>اختر التصميم واكتب اسمك</h2>

    <div class="note">
      أهديكم هذا العمل مجاناً،<br>
      ولا أرجو منكم إلا دعوة صادقة لوالدي رحمه الله، وأن يحفظ الله والدتي ويديم عليها الصحة والعافية، وكل عام وأنتم بخير
    </div>

    <div class="eid-text">
      اخوكم: يزيد بن عبدالرحمن اليامي
    </div>

    <div class="images">
      <img src="ADHA-1.png" onclick="selectImage(this,'ADHA-1.png')" class="selected">
      <img src="ADHA-2.png" onclick="selectImage(this,'ADHA-2.png')">
      <img src="ADHA-3.png" onclick="selectImage(this,'ADHA-3.png')">
    </div>

    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
    <br>
    <button onclick="generateImage()">إنشاء الصورة</button>

    <canvas id="canvas"></canvas>

    <div id="resultContainer">
      <img id="resultImage">
      <br>
      <button onclick="shareImage()">حفظ الصورة</button>
    </div>

  </div>

  <script>
    window.onload = () => {
      setTimeout(() => {
        document.getElementById("intro").classList.add("hide");
        document.getElementById("mainContent").classList.remove("blur");
      }, 1600);
    };

    let selectedImage = "ADHA-1.png";
    let generatedImageURL = "";
    let generatedBlob = null;

    function selectImage(el, src) {
      selectedImage = src;
      document.querySelectorAll(".images img").forEach(i => i.classList.remove("selected"));
      el.classList.add("selected");
    }

    function fitText(ctx, text, maxWidth, startSize, font) {
      let size = startSize;
      while (size > 12) {
        ctx.font = `${size}px "${font}"`;
        if (ctx.measureText(text).width <= maxWidth) return size;
        size--;
      }
      return size;
    }

    function dataURLToBlob(dataURL) {
      const arr = dataURL.split(",");
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8 = new Uint8Array(n);
      while (n--) u8[n] = bstr.charCodeAt(n);
      return new Blob([u8], { type: mime });
    }

    async function generateImage() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = selectedImage;
      await new Promise(res => img.onload = res);

      let font = "Hacen";
      let color = "#28706d";
      let y = 1435;

      if (selectedImage === "ADHA-2.png") {
        color = "#d76959";
        y = 597;
      }

      if (selectedImage === "ADHA-3.png") {
        font = "Tarhouny";
        color = "#FFFFFF";
        y = 450;
      }

      await document.fonts.load(`30px "${font}"`);

      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const size = fitText(ctx, name, 360, 40, font);

      ctx.font = `${size}px "${font}"`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillText(name, 540, y);

      generatedImageURL = canvas.toDataURL("image/png");
      generatedBlob = dataURLToBlob(generatedImageURL);

      document.getElementById("resultImage").src = generatedImageURL;
      document.getElementById("resultContainer").style.display = "block";
    }

    async function shareImage() {
      const file = new File([generatedBlob], "تهنئة.png", { type: "image/png" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
      } else {
        const a = document.createElement("a");
        a.href = generatedImageURL;
        a.download = "تهنئة.png";
        a.click();
      }
    }
  </script>

</body>
</html>
