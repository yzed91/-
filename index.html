<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تهنئة العيد</title>

  <style>
    @font-face {
      font-family: "Hacen";
      src: url("HacenTunisia.ttf") format("truetype");
    }

    @font-face {
      font-family: "MyriadArabic";
      src: url("Myriad Arabic Regular.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    /* 🎬 السينمائية */
    #intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #111 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease;
    }

    #intro img {
      width: 140px;
      opacity: 0;
      transform: scale(0.7);
      animation: cinematicLogo 1.6s ease forwards;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }

    @keyframes cinematicLogo {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    #intro.hide {
      opacity: 0;
      pointer-events: none;
    }

    #mainContent.blur {
      filter: blur(6px);
    }

    h2 {
      color: #222;
      margin-bottom: 10px;
    }

    .note {
      max-width: 700px;
      margin: 0 auto 10px auto;
      font-size: 15px;
      color: #888;
      line-height: 2;
      font-family: "MyriadArabic", Arial, sans-serif;
    }

    .eid-text {
      margin-bottom: 15px;
      font-size: 17px;
      color: #444;
      font-family: "MyriadArabic", Arial, sans-serif;
      font-weight: bold;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0 20px 0;
      flex-wrap: wrap;
    }

    .images img {
      width: 140px;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: 0.25s ease;
      filter: grayscale(100%);
      opacity: 0.75;
    }

    .images img.selected {
      border-color: #000;
      transform: scale(1.03);
      filter: grayscale(0%);
      opacity: 1;
    }

    input {
      width: 80%;
      max-width: 320px;
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      margin-top: 12px;
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #2d6cdf;
      color: #fff;
      cursor: pointer;
    }

    canvas {
      display: none;
    }

    #resultContainer {
      margin-top: 20px;
      display: none;
    }

    #resultImage {
      max-width: 100%;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <!-- 🎬 المقدمة -->
  <div id="intro">
    <img src="logo2.png">
  </div>

  <div id="mainContent" class="blur">

    <h2>اختر التصميم واكتب اسمك</h2>

    <div class="note" style="color: #1B6C64;">
      أهديكم هذا العمل مجاناً،<br>
      ولا أرجو منكم إلا دعوة صادقة لوالدي رحمه الله، وأن يحفظ الله والدتي ويديم عليها الصحة والعافية، وكل عام وأنتم بخير
    </div>

    <div class="eid-text">
      يزيد بن عبدالرحمن اليامي
    </div>

    <div class="images">
      <img src="ADHA-1.png" onclick="selectImage(this, 'ADHA-1.png')" class="selected">
      <img src="ADHA-2.png" onclick="selectImage(this, 'ADHA-2.png')">
    </div>

    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا">
    <br>
    <button onclick="generateImage()">إنشاء الصورة</button>

    <canvas id="canvas"></canvas>

    <div id="resultContainer">
      <img id="resultImage" src="">
      <br>
      <button onclick="shareImage()">حفظ الصورة</button>
    </div>

  </div>

  <script>
    // 🎬 التحكم السينمائي
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("intro").classList.add("hide");
        document.getElementById("mainContent").classList.remove("blur");
      }, 1800);
    });

    let selectedImage = "ADHA-1.png";
    let generatedImageURL = "";
    let generatedBlob = null;

    function selectImage(el, src) {
      selectedImage = src;
      document.querySelectorAll(".images img").forEach(img => {
        img.classList.remove("selected");
      });
      el.classList.add("selected");
    }

    function fitText(ctx, text, maxWidth, startSize, fontName) {
      let size = startSize;
      while (size > 12) {
        ctx.font = `${size}px "${fontName}"`;
        if (ctx.measureText(text).width <= maxWidth) {
          return size;
        }
        size--;
      }
      return size;
    }

    function dataURLToBlob(dataURL) {
      const arr = dataURL.split(",");
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);

      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }

      return new Blob([u8arr], { type: mime });
    }

    async function generateImage() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = selectedImage;

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      if (document.fonts) {
        await document.fonts.load('27px "Hacen"');
        await document.fonts.ready;
      }

      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);

      let color = "#28706d";
      if (selectedImage === "ADHA-2.png") color = "#d76959";

      const x = 540;
      let y = selectedImage === "ADHA-1.png" ? 1435 : 595;

      const maxWidth = 360;
      const fontSize = fitText(ctx, name, maxWidth, 35, "Hacen");

      ctx.font = `${fontSize}px "Hacen"`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.direction = "rtl";

      ctx.fillText(name, x, y, maxWidth);

      generatedImageURL = canvas.toDataURL("image/png");
      generatedBlob = dataURLToBlob(generatedImageURL);

      document.getElementById("resultImage").src = generatedImageURL;
      document.getElementById("resultContainer").style.display = "block";
    }

    async function shareImage() {
      if (!generatedBlob) return;

      const file = new File([generatedBlob], "eid.png", { type: "image/png" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
      } else {
        const link = document.createElement("a");
        link.download = "eid.png";
        link.href = generatedImageURL;
        link.click();
      }
    }
  </script>

</body>
</html>
